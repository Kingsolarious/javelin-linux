name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libbpf-dev linux-headers-generic linux-tools-common linux-tools-generic ${{ matrix.compiler == 'clang' && 'clang' || '' }}
      - name: configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DJVL_BUILD_TESTS=ON
      - name: build
        run: cmake --build build --parallel
      - name: test
        run: ctest --test-dir build --output-on-failure
      - name: eBPF compile
        continue-on-error: true
        run: |
          if command -v bpftool >/dev/null 2>&1 && [[ -f /sys/kernel/btf/vmlinux ]]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > src/ebpf/vmlinux.h
            clang -target bpf -D__TARGET_ARCH_x86_64 -I/usr/include/x86_64-linux-gnu -I/usr/include/bpf -O2 -c src/ebpf/javelin_monitor.bpf.c -o javelin_monitor.bpf.o
            echo "eBPF compiled successfully"
          else
            echo "eBPF compilation skipped (bpftool or BTF unavailable)"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=unusedFunction \
            --suppress=unusedStructMember \
            --suppress=constParameterPointer \
            --suppress=constVariablePointer \
            --suppress=variableScope \
            --suppress=missingInclude \
            --error-exitcode=1 src/

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
          find src tests -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror
